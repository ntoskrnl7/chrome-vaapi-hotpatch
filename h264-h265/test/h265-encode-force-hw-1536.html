<!doctype html>
<meta charset="utf-8">
<title>H.265 HEVC Hardware Encode Test 1536</title>
<pre id="log"></pre>
<canvas id="canvas" width="1536" height="608"></canvas>
<script>
const logEl = document.getElementById('log');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false });
const log = (line) => {
  console.log(line);
  logEl.textContent += line + "\n";
};

const config = {
  codec: 'hvc1.1.6.L180.B0',
  width: 1536,
  height: 608,
  bitrate: 1_837_392,
  bitrateMode: 'constant',
  framerate: 30,
  hardwareAcceleration: 'prefer-hardware',
  latencyMode: 'quality',
};

async function main() {
  const support = await VideoEncoder.isConfigSupported(config);
  log('support=' + JSON.stringify({supported: support.supported, config: support.config}));
  if (!support.supported) return;
  const selected = {...config, ...(support.config || {}), width: 1536, height: 608, bitrateMode: 'constant'};
  log('selected=' + JSON.stringify(selected));
  let chunks = 0;
  let bytes = 0;
  const encoder = new VideoEncoder({
    output(chunk) {
      chunks++;
      bytes += chunk.byteLength;
      log(`chunk ${chunks}: type=${chunk.type} bytes=${chunk.byteLength}`);
    },
    error(error) {
      log('encoder error callback: ' + error.name + ': ' + error.message);
    },
  });
  encoder.configure(selected);
  log('configure returned');
  for (let i = 0; i < 60; i++) {
    ctx.fillStyle = `rgb(${(i * 7) % 255}, ${(i * 19) % 255}, ${(i * 31) % 255})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'white';
    ctx.font = '44px sans-serif';
    ctx.fillText('hevc hw frame ' + i, 36, 88);
    const frame = new VideoFrame(canvas, {
      timestamp: Math.round(i * 1_000_000 / selected.framerate),
      duration: Math.round(1_000_000 / selected.framerate),
    });
    encoder.encode(frame, { keyFrame: i === 0 });
    frame.close();
  }
  await encoder.flush();
  log(`flush resolved chunks=${chunks} bytes=${bytes}`);
  encoder.close();
}

main().catch((error) => log('fatal: ' + error.stack));
</script>
