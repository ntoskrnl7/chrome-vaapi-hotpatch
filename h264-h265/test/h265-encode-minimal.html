<!doctype html>
<meta charset="utf-8">
<title>H.265 HEVC Minimal Encode Test</title>
<pre id="log"></pre>
<canvas id="canvas" width="1520" height="608"></canvas>
<script>
const logEl = document.getElementById('log');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false });
const log = (line) => {
  console.log(line);
  logEl.textContent += line + "\n";
};

const config = {
  codec: 'hvc1.1.6.L93',
  width: 1520,
  height: 608,
  bitrate: 5_000_000,
  framerate: 30,
  hardwareAcceleration: 'prefer-hardware',
  latencyMode: 'realtime',
};

async function main() {
  if (!('VideoEncoder' in self)) {
    log('fatal: VideoEncoder missing');
    return;
  }

  const support = await VideoEncoder.isConfigSupported(config);
  log('support=' + JSON.stringify({
    supported: support.supported,
    config: support.config,
  }));

  if (!support.supported) {
    log('fatal: HEVC config is not supported');
    return;
  }

  const selected = {
    ...config,
    ...(support.config || {}),
    width: config.width,
    height: config.height,
    bitrate: config.bitrate,
    framerate: config.framerate,
    hardwareAcceleration: config.hardwareAcceleration,
    latencyMode: config.latencyMode,
  };
  log('selected=' + JSON.stringify(selected));

  let chunks = 0;
  let bytes = 0;
  const encoder = new VideoEncoder({
    output(chunk) {
      chunks++;
      bytes += chunk.byteLength;
      log(`chunk ${chunks}: type=${chunk.type} bytes=${chunk.byteLength}`);
    },
    error(error) {
      log('encoder error callback: ' + error.name + ': ' + error.message);
    },
  });

  encoder.configure(selected);
  log('configure returned');

  for (let i = 0; i < 60; i++) {
    ctx.fillStyle = `rgb(${(i * 7) % 255}, ${(i * 19) % 255}, ${(i * 31) % 255})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'white';
    ctx.font = '44px sans-serif';
    ctx.fillText('hevc minimal frame ' + i, 36, 88);

    const frame = new VideoFrame(canvas, {
      timestamp: Math.round(i * 1_000_000 / selected.framerate),
      duration: Math.round(1_000_000 / selected.framerate),
    });
    encoder.encode(frame, { keyFrame: i === 0 });
    frame.close();
  }

  await encoder.flush();
  log(`flush resolved chunks=${chunks} bytes=${bytes}`);
  encoder.close();
}

main().catch((error) => log('fatal: ' + error.stack));
</script>
